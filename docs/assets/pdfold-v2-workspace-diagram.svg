<svg width="1200" height="620" viewBox="0 0 1200 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">PDFold v2 Product Flow</title>
  <desc id="desc">A symmetrical product flow diagram showing files imported into PDFold, organized and marked up in the workspace, then saved or exported as artifacts.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111F"/>
      <stop offset="0.55" stop-color="#0B1726"/>
      <stop offset="1" stop-color="#06110F"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#172033"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" stroke="#1F3348" stroke-width="1" opacity="0.35"/>
    </pattern>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { font: 800 30px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #F8FAFC; }
      .kicker { font: 800 12px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; letter-spacing: 2.4px; fill: #67E8F9; }
      .label { font: 800 21px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #F8FAFC; }
      .body { font: 600 15px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #B6C2D2; }
      .small { font: 700 13px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #8EA0B8; }
      .chip { font: 800 13px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #E2E8F0; }
      .card { fill: url(#card); stroke: #2B3F5C; stroke-width: 1.5; }
      .chipBox { fill: #101B2D; stroke: #31506F; stroke-width: 1.2; }
      .arrow { stroke: #2DD4BF; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="1200" height="620" rx="26" fill="#020617"/>
  <rect x="28" y="28" width="1144" height="564" rx="24" fill="url(#bg)"/>
  <rect x="28" y="28" width="1144" height="564" rx="24" fill="url(#grid)" opacity="0.75"/>

  <text x="600" y="84" text-anchor="middle" class="title">PDFold v2 Product Flow</text>
  <text x="600" y="113" text-anchor="middle" class="body">Import files. Assemble a workspace. Export clean artifacts.</text>

  <g filter="url(#shadow)">
    <rect x="80" y="168" width="300" height="300" rx="22" class="card"/>
    <text x="112" y="212" class="kicker">01 INPUT</text>
    <text x="112" y="248" class="label">Bring files in</text>
    <text x="112" y="282" class="body">PDFs, Word docs, HTML,</text>
    <text x="112" y="305" class="body">Markdown, text, data files,</text>
    <text x="112" y="328" class="body">and images.</text>
    <g transform="translate(112 368)">
      <rect x="0" y="0" width="70" height="34" rx="10" class="chipBox"/>
      <text x="35" y="23" text-anchor="middle" class="chip">PDF</text>
      <rect x="82" y="0" width="70" height="34" rx="10" class="chipBox"/>
      <text x="117" y="23" text-anchor="middle" class="chip">DOCX</text>
      <rect x="164" y="0" width="70" height="34" rx="10" class="chipBox"/>
      <text x="199" y="23" text-anchor="middle" class="chip">HTML</text>
      <rect x="0" y="48" width="70" height="34" rx="10" class="chipBox"/>
      <text x="35" y="71" text-anchor="middle" class="chip">TXT</text>
      <rect x="82" y="48" width="70" height="34" rx="10" class="chipBox"/>
      <text x="117" y="71" text-anchor="middle" class="chip">CSV</text>
      <rect x="164" y="48" width="70" height="34" rx="10" class="chipBox"/>
      <text x="199" y="71" text-anchor="middle" class="chip">IMG</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="450" y="148" width="300" height="340" rx="22" class="card"/>
    <text x="482" y="192" class="kicker">02 WORKSPACE</text>
    <text x="482" y="228" class="label">Organize and review</text>
    <text x="482" y="262" class="body">A native Mac workspace</text>
    <text x="482" y="285" class="body">with page thumbnails, search,</text>
    <text x="482" y="308" class="body">inspector tabs, and contents.</text>
    <rect x="506" y="348" width="72" height="82" rx="14" fill="#111827" stroke="#334155"/>
    <rect x="596" y="328" width="86" height="122" rx="14" fill="#F8FAFC" stroke="#CBD5E1"/>
    <rect x="614" y="352" width="50" height="9" rx="4" fill="#94A3B8"/>
    <rect x="614" y="378" width="50" height="7" rx="3.5" fill="#CBD5E1"/>
    <rect x="614" y="399" width="50" height="8" rx="4" fill="#FACC15" opacity="0.65"/>
    <path d="M616 426 C634 414 648 439 666 426" stroke="#0F766E" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="820" y="168" width="300" height="300" rx="22" class="card"/>
    <text x="852" y="212" class="kicker">03 OUTPUT</text>
    <text x="852" y="248" class="label">Save or export</text>
    <text x="852" y="282" class="body">Keep editing in a package,</text>
    <text x="852" y="305" class="body">or export a clean deliverable</text>
    <text x="852" y="328" class="body">for sharing.</text>
    <g transform="translate(852 368)">
      <rect x="0" y="0" width="92" height="36" rx="10" fill="#102A2A" stroke="#10B981"/>
      <text x="46" y="24" text-anchor="middle" class="chip">.pdfoldproj</text>
      <rect x="108" y="0" width="58" height="36" rx="10" class="chipBox"/>
      <text x="137" y="24" text-anchor="middle" class="chip">PDF</text>
      <rect x="178" y="0" width="70" height="36" rx="10" class="chipBox"/>
      <text x="213" y="24" text-anchor="middle" class="chip">DOCX</text>
      <rect x="0" y="50" width="58" height="36" rx="10" class="chipBox"/>
      <text x="29" y="74" text-anchor="middle" class="chip">TXT</text>
      <rect x="72" y="50" width="70" height="36" rx="10" class="chipBox"/>
      <text x="107" y="74" text-anchor="middle" class="chip">HTML</text>
      <rect x="156" y="50" width="92" height="36" rx="10" class="chipBox"/>
      <text x="202" y="74" text-anchor="middle" class="chip">PNG/JPG</text>
    </g>
  </g>

  <path d="M392 318 H430" class="arrow"/>
  <path d="M418 306 L432 318 L418 330" class="arrow"/>
  <path d="M762 318 H800" class="arrow"/>
  <path d="M788 306 L802 318 L788 330" class="arrow"/>

  <g transform="translate(158 520)">
    <rect x="0" y="0" width="884" height="44" rx="14" fill="#071A1F" stroke="#164E63"/>
    <text x="442" y="28" text-anchor="middle" class="small">Local-first by design: documents, metadata, markup, and exports stay on your Mac.</text>
  </g>
</svg>
