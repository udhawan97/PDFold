<svg width="1200" height="820" viewBox="0 0 1200 820" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">PDFold v2 Technical Architecture</title>
  <desc id="desc">A technical architecture diagram for PDFold v2 showing SwiftUI views, workspace state, PDFKit services, local persistence, exports, installer workflow, and release guardrails.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111F"/>
      <stop offset="0.55" stop-color="#0B1628"/>
      <stop offset="1" stop-color="#061511"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#172033"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="engine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F2747"/>
      <stop offset="1" stop-color="#0B172A"/>
    </linearGradient>
    <linearGradient id="guard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A2C22"/>
      <stop offset="1" stop-color="#071A18"/>
    </linearGradient>
    <linearGradient id="artifact" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#23163A"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" stroke="#20334B" stroke-width="1" opacity="0.32"/>
    </pattern>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000" flood-opacity="0.34"/>
    </filter>
    <style>
      .title { font: 800 30px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #F8FAFC; }
      .subtitle { font: 600 14px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #AAB8CB; }
      .kicker { font: 800 12px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; letter-spacing: 2.3px; fill: #67E8F9; }
      .kickerGreen { font: 800 12px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; letter-spacing: 2.3px; fill: #34D399; }
      .label { font: 800 15px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #F8FAFC; }
      .body { font: 600 12px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #94A3B8; }
      .code { font: 700 11px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #9CCCFB; }
      .panel { fill: url(#panel); stroke: #2C405D; stroke-width: 1.5; }
      .enginePanel { fill: url(#engine); stroke: #2563EB; stroke-width: 1.5; }
      .guardPanel { fill: url(#guard); stroke: #16A34A; stroke-width: 1.5; }
      .artifactPanel { fill: url(#artifact); stroke: #8B5CF6; stroke-width: 1.5; }
      .module { fill: #101B2C; stroke: #31506F; stroke-width: 1.2; }
      .engineModule { fill: #10243B; stroke: #38BDF8; stroke-width: 1.2; }
      .artifactModule { fill: #19162B; stroke: #A78BFA; stroke-width: 1.2; }
      .guardModule { fill: #08251C; stroke: #22C55E; stroke-width: 1.2; }
      .arrow { stroke: #64748B; stroke-width: 2.8; stroke-linecap: round; stroke-linejoin: round; }
      .flow { stroke: #2DD4BF; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="1200" height="820" rx="26" fill="#020617"/>
  <rect x="28" y="28" width="1144" height="764" rx="24" fill="url(#bg)"/>
  <rect x="28" y="28" width="1144" height="764" rx="24" fill="url(#grid)" opacity="0.75"/>

  <text x="600" y="76" text-anchor="middle" class="title">PDFold v2 Technical Architecture</text>
  <text x="600" y="106" text-anchor="middle" class="subtitle">SwiftUI document app, observable workspace state, PDFKit services, local packages, and hardened exports.</text>

  <g filter="url(#shadow)">
    <rect x="80" y="140" width="820" height="126" rx="20" class="panel"/>
    <text x="112" y="180" class="kicker">SWIFTUI APPLICATION SURFACE</text>
    <text x="112" y="204" class="subtitle">Document-based macOS UI composed from focused views.</text>
    <g transform="translate(112 222)">
      <rect x="0" y="0" width="146" height="34" rx="10" class="module"/>
      <text x="73" y="22" text-anchor="middle" class="label">ContentView</text>
      <rect x="166" y="0" width="146" height="34" rx="10" class="module"/>
      <text x="239" y="22" text-anchor="middle" class="label">SidebarView</text>
      <rect x="332" y="0" width="146" height="34" rx="10" class="module"/>
      <text x="405" y="22" text-anchor="middle" class="label">ReadingCanvas</text>
      <rect x="498" y="0" width="146" height="34" rx="10" class="module"/>
      <text x="571" y="22" text-anchor="middle" class="label">InspectorView</text>
      <rect x="664" y="0" width="112" height="34" rx="10" class="module"/>
      <text x="720" y="22" text-anchor="middle" class="label">Search</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="930" y="140" width="190" height="126" rx="20" class="guardPanel"/>
    <text x="958" y="180" class="kickerGreen">APP ENTRY</text>
    <text x="958" y="207" class="label">PDFoldApp</text>
    <text x="958" y="231" class="body">DocumentGroup</text>
    <text x="958" y="250" class="body">AppCommands</text>
  </g>

  <path d="M490 276 V314" class="arrow"/>
  <path d="M478 302 L490 316 L502 302" class="arrow"/>

  <g filter="url(#shadow)">
    <rect x="80" y="326" width="1040" height="122" rx="20" class="panel"/>
    <text x="112" y="366" class="kicker">STATE + DOCUMENT MODEL</text>
    <text x="112" y="390" class="subtitle">One observable view model coordinates workspace metadata, loaded PDFs, page order, undo, search, and exports.</text>
    <g transform="translate(112 406)">
      <rect x="0" y="0" width="210" height="34" rx="10" class="module"/>
      <text x="105" y="22" text-anchor="middle" class="label">WorkspaceViewModel</text>
      <rect x="236" y="0" width="190" height="34" rx="10" class="module"/>
      <text x="331" y="22" text-anchor="middle" class="label">WorkspaceDocument</text>
      <rect x="452" y="0" width="142" height="34" rx="10" class="module"/>
      <text x="523" y="22" text-anchor="middle" class="label">Workspace</text>
      <rect x="620" y="0" width="142" height="34" rx="10" class="module"/>
      <text x="691" y="22" text-anchor="middle" class="label">PageRef</text>
      <rect x="788" y="0" width="142" height="34" rx="10" class="module"/>
      <text x="859" y="22" text-anchor="middle" class="label">Signatures</text>
    </g>
  </g>

  <path d="M600 458 V496" class="arrow"/>
  <path d="M588 484 L600 498 L612 484" class="arrow"/>

  <g filter="url(#shadow)">
    <rect x="80" y="508" width="1040" height="142" rx="20" class="enginePanel"/>
    <text x="112" y="548" class="kicker">PDFKIT + WORKFLOW SERVICES</text>
    <text x="112" y="572" class="subtitle">Local conversion, composition, markup, page operations, and artifact writers.</text>
    <g transform="translate(112 592)">
      <rect x="0" y="0" width="176" height="42" rx="11" class="engineModule"/>
      <text x="88" y="19" text-anchor="middle" class="label">Import Converter</text>
      <text x="88" y="34" text-anchor="middle" class="code">DocumentImportConverter</text>
      <rect x="194" y="0" width="176" height="42" rx="11" class="engineModule"/>
      <text x="282" y="19" text-anchor="middle" class="label">PDF Engine</text>
      <text x="282" y="34" text-anchor="middle" class="code">PDFKitEngine</text>
      <rect x="388" y="0" width="176" height="42" rx="11" class="engineModule"/>
      <text x="476" y="19" text-anchor="middle" class="label">PDF Canvas</text>
      <text x="476" y="34" text-anchor="middle" class="code">PDFView + PDFPage</text>
      <rect x="582" y="0" width="176" height="42" rx="11" class="engineModule"/>
      <text x="670" y="19" text-anchor="middle" class="label">Annotations</text>
      <text x="670" y="34" text-anchor="middle" class="code">PDFAnnotation</text>
      <rect x="776" y="0" width="154" height="42" rx="11" class="engineModule"/>
      <text x="853" y="19" text-anchor="middle" class="label">Export Writers</text>
      <text x="853" y="34" text-anchor="middle" class="code">PDF/DOCX/HTML</text>
    </g>
  </g>

  <path d="M600 660 V698" class="arrow"/>
  <path d="M588 686 L600 700 L612 686" class="arrow"/>

  <g filter="url(#shadow)">
    <rect x="80" y="710" width="500" height="70" rx="20" class="artifactPanel"/>
    <text x="112" y="742" class="kicker">LOCAL ARTIFACTS</text>
    <text x="112" y="764" class="body">.pdfoldproj package, workspace.json, PDF data, signatures, exports</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="620" y="710" width="500" height="70" rx="20" class="guardPanel"/>
    <text x="652" y="742" class="kickerGreen">RELEASE GUARDRAILS</text>
    <text x="652" y="764" class="body">Import limits, ink repair, serialization fallback, bounded image export</text>
  </g>

  <path d="M900 203 H930" class="flow"/>
  <path d="M918 191 L932 203 L918 215" class="flow"/>
</svg>
